<!DOCTYPE html>
<meta charset="UTF-8">
<title>登录注册</title>
<style>
    body{max-width: 400px;margin: 50px auto;}
    input{width: 100%;padding: 10px;margin: 8px 0;}
    button{padding: 10px 20px;margin: 5px;cursor: pointer;}
</style>

<h2>登录&注册</h2>
<input id="username" placeholder="请输入账号（3-16位）">
<input id="password" type="password" placeholder="请输入密码（3-16位）">
<button id="submit" onclick="login()">登录</button>
<button id="register" onclick="register()">注册</button>

<script>
    // 校验函数（通用）
    function checkUserPwd() {
        let username = document.getElementById("username").value.trim();
        let password = document.getElementById("password").value.trim();

        if (!username || !password) {
            alert("账号和密码不能为空！");
            return null;
        }
        if (username.length < 3 || password.length < 3) {
            alert("账号/密码长度不能小于3位！");
            return null;
        }
        return { username, password };
    }
    // 登录
    async function login() {
        let data=checkUserPwd();
        if(!data){
            return;
        }

        try {
            let res = await fetch('http://127.0.0.1:5000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })

            let json = await res.json()
            if (json.code === 0) {
                localStorage.username=document.getElementById("username").value;
                localStorage.userId = json.userId
                localStorage.role = json.role
                alert('登录成功')
                location.href = 'index.html'
            } else {
                alert(json.msg)
            }
        } catch (e) {
            console.error(e)
            alert('后端服务未启动')
        }
    }
    // 注册
    async function register() {
        let data=checkUserPwd();
        if(!data){
            return;
        }
        let res = await fetch("http://127.0.0.1:5000/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        })
        let json = await res.json()
        alert(json.msg)
    }
</script>
