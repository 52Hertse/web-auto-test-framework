<!DOCTYPE html>
<meta charset="UTF-8">
<title>商品搜索</title>
<input id="keyword" type="text" placeholder="搜索商品">
<button id="searchBtn" onclick="search()">搜索</button>
<h3 style="color: #2f4050; margin-top: 20px;">搜索结果：</h3>
<div id="result"
     style="min-height: 100px;
            padding: 15px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            background: #fafafa;">
    请输入关键词搜索商品
</div>

<script>
    let currentGoodsId = null;

    async function search() {
        let kw = document.getElementById("keyword").value;

        let res = await fetch("http://127.0.0.1:5000/api/search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ keyword: kw })
        }).then(r => r.json());

        if (res.data.length > 0) {
            let g = res.data[0];
            currentGoodsId = g.id;

            document.getElementById("result").innerHTML = `
                商品：${g.name}
                价格：${g.price}元
                <button id="addToCart" onclick="addCart()"
        style="margin-top: 20px;
               padding: 5px 7px;
               background: orange;
               color: white;
               border: none;
               border-radius: 6px;
               font-size: 12px;
               cursor: pointer;">
    加入购物车
</button>
            `;
        }
    }

    // ==========================
    // 加入购物车（最终版）
    // ==========================
    async function addCart() {
        let userId = localStorage.getItem("userId");

        if (!userId) {
            alert("请先登录！");
            return;
        }
        if (!currentGoodsId) {
            alert("请先搜索商品！");
            return;
        }

        try {
            let resp = await fetch("http://127.0.0.1:5000/api/cart/add", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    user_id: parseInt(userId),
                    goods_id: currentGoodsId
                })
            });

            let json = await resp.json();
            if (json.code === 0) {
                alert("加入成功！");
                location.href = "cart.html";
            } else {
                alert("失败：" + json.msg);
            }
        } catch (e) {
            console.error(e);
            alert("请求失败：" + e.toString());
        }
    }
</script>
